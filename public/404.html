<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Redirigiendo...</title>
  <script>
    var redirectPath = location.pathname + location.search + location.hash;
    sessionStorage.setItem('redirect', redirectPath);

    if (location.pathname.indexOf('/card/') === 0 || location.pathname.indexOf('/edit/') === 0) {
      location.replace('/card-entry');
    } else {
      location.replace('/');
    }
  </script>
</head>

<body>
  <p>Redirigiendo...</p>
</body>

</html>
