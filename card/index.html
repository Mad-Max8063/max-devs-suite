<!DOCTYPE html>
<html class="dark" lang="es">
<!-- Suito Card v2.0.0 - Gold & Obsidian Edition -->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#121212">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>Suito | Tarjeta Digital</title>
  <meta name="description" content="Agencia de Software & Transformación Digital. Conectá con nosotros y elevá tu negocio al siguiente nivel.">

  <!-- base href eliminado: ahora Vite maneja la base URL -->
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="manifest" href="/card/manifest-v2030.webmanifest?v=2030">

  <!-- Stitch / Tailwind Dependencies -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

  <!-- Tailwind Config from Stitch -->
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-surface": "#F5F5F5",
            "surface-container": "#1E1E1E",
            "surface-variant": "#2C2C2C",
            "background": "#121212",
            "primary": "var(--color-primary)",
            "primary-container": "var(--color-primary-dark)",
            "on-primary": "#121212",
            "surface-container-highest": "#2C2C2C"
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },
        },
      },
    }
  </script>
  <style>
    body {
      -webkit-tap-highlight-color: transparent;
      scroll-behavior: smooth;
      /* min-height: max(884px, 100dvh) — REMOVED: rigid dimension caused overflow on small viewports */
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .glass-card {
      background: rgba(30, 30, 30, 0.7);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(var(--color-primary-rgb), 0.15);
    }
  </style>

  <link rel="stylesheet" href="./css/styles.css?v=2030">
</head>

<body class="theme-gold font-body antialiased selection:bg-primary-container selection:text-on-primary-container">
  
  <div id="app" class="app-container relative"></div>

  <script type="module" src="./js/app-v2029-final.js?v=2030"></script>
</body>
</html>
