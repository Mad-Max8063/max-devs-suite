name: Despliegue FTP Tarjetas a Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'tarjeta-virtual/**'
      - '.github/workflows/deploy-suito-tarjetas.yml'
  workflow_dispatch:

jobs:
  deploy-tarjetas:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Deploy to Hostinger via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./tarjeta-virtual/
        server-dir: card-app/
