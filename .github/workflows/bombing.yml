name: 💣 BOMBARDEO DE CARPETAS - Descubrimiento de Raíz

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  bombing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---------------------------------------------------------
      # 🎯 DESPLIEGUE A TODAS LAS RUTAS POSIBLES
      # ---------------------------------------------------------

      - name: "🏠 Intento 1: Raíz (./)"
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./landing-ventas/
          server-dir: ./
          only-newer: false

      - name: "🌐 Intento 2: public_html/"
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./landing-ventas/
          server-dir: public_html/
          only-newer: false

      - name: "📦 Intento 3: public_html/public_html/"
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./landing-ventas/
          server-dir: public_html/public_html/
          only-newer: false

      - name: "🎯 Intento 4: domains/suito.pro/public_html/"
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./landing-ventas/
          server-dir: domains/suito.pro/public_html/
          only-newer: false

      - name: "🚀 Intento 5: domains/suito.pro/"
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./landing-ventas/
          server-dir: domains/suito.pro/
          only-newer: false

      # ---------------------------------------------------------
      # 💉 SUBIDA DE MARCADORES (Uno a cada carpeta)
      # ---------------------------------------------------------
      - name: 🧨 Subir Marcador Raíz
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ./
          only-newer: false

