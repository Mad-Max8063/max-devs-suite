name: Despliegue FTP Panel Admin a Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'admin-panel/**'
      - '.github/workflows/deploy-admin.yml'
  workflow_dispatch:

jobs:
  deploy-admin:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Obtener código fuente
        uses: actions/checkout@v4

      - name: 🚀 Subir Admin Panel por FTP a Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./admin-panel/ # ⚠️ Solo subimos la carpeta del admin-panel
          server-dir: admin/
          exclude: |
            **/.git*
            **/.git*/**
