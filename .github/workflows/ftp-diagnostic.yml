name: FTP Path Diagnostic

on:
  workflow_dispatch:

jobs:
  diagnose:
    name: 🔍 FTP Path Explorer
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Install lftp
        run: sudo apt-get install -y lftp

      - name: 🔍 Explore FTP Root Structure
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          echo "=== Connecting to FTP server ==="
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" ftp://$FTP_SERVER <<EOF
          set ssl:verify-certificate no
          set ftp:ssl-allow yes
          set ftp:ssl-force no
          echo "=== PWD (home directory) ==="
          pwd
          echo "=== LS of root (home) ==="
          ls
          echo "=== Checking if public_html exists ==="
          ls public_html/ || echo "public_html/ NOT FOUND at this level"
          echo "=== Checking if public_html/card exists ==="
          ls public_html/card/ || echo "public_html/card/ NOT FOUND"
          echo "=== Checking if card exists at root ==="
          ls card/ || echo "card/ NOT FOUND at root"
          echo "=== Checking public_html/public_html (double nesting?) ==="
          ls public_html/public_html/ || echo "NO double nesting"
          echo "=== Looking for index.html in different paths ==="
          ls -la public_html/index.html || echo "No index.html in public_html/"
          ls -la public_html/card/index.html || echo "No index.html in public_html/card/"
          ls -la card/index.html || echo "No index.html in card/"
          echo "=== Checking if v1.0.3 marker exists ==="
          cat public_html/card/index.html || echo "CANT READ public_html/card/index.html"
          echo "=== If root IS public_html, check card/ directly ==="
          cat card/index.html || echo "CANT READ card/index.html"
          echo "=== DONE ==="
          quit
          EOF
