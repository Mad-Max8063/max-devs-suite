name: 🔍 DEBUG - Explorar Carpetas FTP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  debug-ftp:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Listado Recursivo de Carpetas
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          dry-run: true # No sube nada, solo explora
          server-dir: ./ # Empieza desde la raíz total
