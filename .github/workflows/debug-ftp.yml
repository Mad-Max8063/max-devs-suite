name: DEBUG - Explorar Carpetas FTP

on:
  workflow_dispatch: # Se lanza manualmente o al pushear

jobs:
  debug-ftp:
    runs-on: ubuntu-latest
    steps:
      - name: ⚙️ Instalar lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: 🔍 Listado Recursivo de Carpetas
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" -e "ls -R; quit"
