name: 🚀 Parche de Resurrección - Suito

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  resurrection:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: 🏗️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: gestor-de-turnos/package-lock.json

      - name: 📦 Build Turnos
        run: |
          cd gestor-de-turnos
          npm install
          npm run build

      - name: 🌐 Landing (Triple Disparo)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./landing-ventas/
          server-dir: domains/suito.pro/public_html/

      - name: 🌐 Landing (Fallback public_html)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./landing-ventas/
          server-dir: public_html/

      - name: ⚙️ Admin (Triple Disparo)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./admin-panel/
          server-dir: domains/suito.pro/public_html/admin/

      - name: 💳 Tarjetas (Triple Disparo)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./tarjeta-virtual/
          server-dir: domains/suito.pro/public_html/card-app/

      - name: 📅 Turnos (Triple Disparo)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./gestor-de-turnos/dist/
          server-dir: domains/suito.pro/public_html/turnos/
