name: 🚀 PROD — Suito Unified Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Suito Platform
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build (Vite MPA)
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: 📂 Duplicate Assets & Patch Paths
        run: |
          # 1. Duplicar assets en cada módulo para resolución independiente
          mkdir -p dist/admin/assets dist/card/assets dist/turnos/assets
          cp -r dist/assets/* dist/admin/assets/
          cp -r dist/assets/* dist/card/assets/
          cp -r dist/assets/* dist/turnos/assets/
          
          # 2. Parchear rutas en los HTML (Vite genera ../assets/ por base: './')
          # También corregimos referencias absolutas a carpetas de módulos y Service Workers
          find dist/admin dist/card dist/turnos -name "index.html" -exec sed -i \
            -e 's|src="../assets/|src="./assets/|g' \
            -e 's|href="../assets/|href="./assets/|g' \
            -e 's|src="/admin/|src="./|g' \
            -e 's|href="/admin/|href="./|g' \
            -e 's|src="/card/|src="./|g' \
            -e 's|href="/card/|href="./|g' \
            -e 's|src="/turnos/|src="./|g' \
            -e 's|href="/turnos/|href="./|g' \
            -e "s|navigator.serviceWorker.register('/|navigator.serviceWorker.register('./|g" \
            -e "s|scope: '/|scope: './|g" \
            {} +
          echo "Assets duplicated and paths robustly patched for independent subdomain resolution."

      - name: 🚀 Deploy → suito.pro (High-Speed Rsync)
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass rsync
          sshpass -e rsync -avz --delete -e "ssh -p 65002 -o StrictHostKeyChecking=no" ./dist/ u543991373@147.93.14.107:domains/suito.pro/public_html/
