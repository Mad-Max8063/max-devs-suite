name: 🚀 PROD — Suito Unified Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Suito Platform
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build (Vite MPA)
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: 📂 Duplicate Assets for Subdomains
        run: |
          # Duplicamos la carpeta de assets en cada módulo para que los subdominios
          # (que tienen su propia raíz) puedan resolver las rutas absolutas '/assets/...'
          mkdir -p dist/admin/assets dist/card/assets dist/turnos/assets
          cp -r dist/assets/* dist/admin/assets/
          cp -r dist/assets/* dist/card/assets/
          cp -r dist/assets/* dist/turnos/assets/
          echo "Assets duplicated for unified module resolution."

      - name: 🚀 Deploy → suito.pro (Standard FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /domains/suito.pro/public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
