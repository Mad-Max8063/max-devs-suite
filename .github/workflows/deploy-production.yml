name: 🚀 PROD — Suito Unified Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Suito Platform
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build (Vite MPA)
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: 🚀 Deploy → suito.pro (High-Speed Rsync)
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass rsync
          sshpass -e rsync -avz --delete -e "ssh -p 65002 -o StrictHostKeyChecking=no" ./dist/ u543991373@147.93.14.107:domains/suito.pro/public_html/
