name: 🚀 PROD — Suito Unified Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Suito Platform
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build
        run: |
          npm run build

          # Redundancia de assets para Hostinger (resolución de paths por subcarpeta)
          mkdir -p dist/admin/assets dist/card/assets dist/turnos/assets
          cp -r dist/assets/* dist/admin/assets/ 2>/dev/null || :
          cp -r dist/assets/* dist/card/assets/  2>/dev/null || :
          cp -r dist/assets/* dist/turnos/assets/ 2>/dev/null || :

          # Favicon en subcarpeta card
          cp card/favicon.png dist/card/favicon.png 2>/dev/null || :

          # PWA assets de card (sw-v2030.js + manifest-v2030.webmanifest)
          cp public/card/sw-v2030.js dist/card/sw-v2030.js 2>/dev/null || :
          cp public/card/manifest-v2030.webmanifest dist/card/manifest-v2030.webmanifest 2>/dev/null || :

          # PWA assets de turnos (sw.js + manifest.json viven en turnos/public/)
          cp turnos/public/sw.js dist/turnos/sw.js 2>/dev/null || :
          cp turnos/public/manifest.json dist/turnos/manifest.json 2>/dev/null || :

          # PWA assets de admin (sw-admin.js + manifest.json)
          cp public/admin/sw-admin.js dist/admin/sw-admin.js 2>/dev/null || :
          cp public/admin/manifest.json dist/admin/manifest.json 2>/dev/null || :

          # .htaccess (Apache routing rules)
          cp public/.htaccess dist/.htaccess 2>/dev/null || :

          # composer.json vacío para compatibilidad con Hostinger
          echo '{}' > dist/composer.json
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      
      - name: 🚀 Publish dist/ to deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: deploy
          publish_dir: ./dist
          force_orphan: true
