name: 🚀 PROD — Suito Unified Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Suito Platform
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build
        run: |
          npm run build

          # Redundancia de assets para Hostinger (resolución de paths por subcarpeta)
          rm -rf dist/admin/assets dist/card/assets dist/turnos/assets
          mkdir -p dist/admin/assets dist/card/assets dist/turnos/assets
          cp -r dist/assets/* dist/admin/assets/ 2>/dev/null || :
          cp -r dist/assets/* dist/card/assets/  2>/dev/null || :
          cp -r dist/assets/* dist/turnos/assets/ 2>/dev/null || :

          # Favicon en subcarpeta card
          cp card/favicon.png dist/card/favicon.png 2>/dev/null || :
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      
      - name: 🚀 Deploy via rsync SSH
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude='.git*' --exclude='node_modules/' --exclude='*.map' --exclude='assets/assets/' --exclude='tarjeta/' --exclude='compartido/'
          path: dist/
          remote_path: /home/u543991371/domains/suito.pro/public_html/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_port: ${{ secrets.SSH_PORT }}
          remote_user: ${{ secrets.SSH_USERNAME }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
