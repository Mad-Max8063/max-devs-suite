name: 🚀 PROD — Suito Unified Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Suito Platform
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build (Vite MPA)
        run: |
          npm run build
          # Redundancia de Assets para Subdominios en Hostinger
          cp -r dist/assets dist/admin/assets
          cp -r dist/assets dist/card/assets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Post-Build Asset Redundancy
        run: |
          # Redundancia de assets para subdominios (Vite MPA fallback)
          cp -r dist/assets dist/admin/assets
          cp -r dist/assets dist/card/assets
          cp -r dist/assets dist/turnos/assets
          # Asegurar que el manifest y el SW residan en /card/ para que el path ./ resuelva
          cp dist/card/manifest-v4.webmanifest dist/card/manifest-v4.webmanifest 2>/dev/null || :
          cp dist/card/sw.js dist/card/sw.js 2>/dev/null || :
      
      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./dist/
          # Intentamos una ruta relativa más común por si la absoluta bloquea
          server-dir: domains/suito.pro/public_html/
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/card/js/**
            **/admin/assets/**
            **/tarjeta/**
            **/compartido/**
            **/turnos/activos/**
            **/shared/**
            **/sw-v4.js
