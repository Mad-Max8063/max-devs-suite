name: PROD - Max Devs Unified Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Silenciar advertencias de Node 20

jobs:
  # 1. Landing Page (Root)
  deploy-landing:
    name: 🌐 Landing Page (Root)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🛠️ Prepare Landing with Root Config
        run: cp .htaccess ./landing-ventas/.htaccess # Copiar el maestro a la carpeta de despliegue

      - name: 🚀 FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./landing-ventas/
          server-dir: ./
          port: 21
          protocol: ftps
          timeout: 180000

  # 2. Virtual Card (/card)
  deploy-card:
    name: 🃏 Virtual Card (/card)
    needs: deploy-landing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 🚀 FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./tarjeta-virtual/
          server-dir: card/
          port: 21
          protocol: ftps
          timeout: 180000

  # 3. Gestor de Turnos (/turnos)
  deploy-turnos:
    name: 📆 Gestor de Turnos (/turnos)
    needs: deploy-card # Cambio a secuencial
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 📦 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './gestor-de-turnos/package-lock.json'
          
      - name: 🏗️ Build Gestor
        working-directory: ./gestor-de-turnos
        run: |
          npm install
          npm run build
          
      - name: 🚀 FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./gestor-de-turnos/dist/
          server-dir: turnos/
          port: 21
          protocol: ftps
          timeout: 180000

  # 4. Admin Panel (/admin)
  deploy-admin:
    name: 🛡️ Admin Panel (/admin)
    needs: deploy-turnos # Secuencial para evitar saturación FTP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 🚀 FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./admin-panel/
          server-dir: admin/
          port: 21
          protocol: ftps
          timeout: 180000

  # 5. Shared Assets (/assets)
  deploy-assets:
    name: 🖼️ Shared Assets (/assets)
    needs: deploy-admin # Cambio a secuencial
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 🚀 FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./assets/
          server-dir: assets/
          port: 21
          protocol: ftps
          timeout: 180000
