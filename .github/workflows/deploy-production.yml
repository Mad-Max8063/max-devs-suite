name: 🚀 PROD — Suito Unified Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Suito Platform
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build (Vite MPA)
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: 📂 Duplicate Assets for Subdomains
        run: |
          # Duplicamos la carpeta de assets en cada módulo para que los subdominios
          # (que tienen su propia raíz) puedan resolver las rutas absolutas '/assets/...'
          mkdir -p dist/admin/assets dist/card/assets dist/turnos/assets
          cp -r dist/assets/* dist/admin/assets/
          cp -r dist/assets/* dist/card/assets/
          cp -r dist/assets/* dist/turnos/assets/
          echo "Assets duplicated for unified module resolution."

      - name: 🚀 Deploy → suito.pro (Robust Rsync)
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          # 1. Instalar herramientas de red y transferencia
          sudo apt-get update && sudo apt-get install -y sshpass rsync netcat-openbsd
          
          # 2. Sondeo de conectividad (diagnóstico temprano)
          echo "🔍 Probando conexión a 147.93.14.107:65002..."
          if ! nc -zv -w 5 147.93.14.107 65002; then
            echo "⚠️ ADVERTENCIA: El puerto 65002 no responde. El firewall de Hostinger podría estar bloqueando esta IP."
          fi

          # 3. Pre-cargar host key para evitar prompts interactivos
          mkdir -p ~/.ssh
          ssh-keyscan -p 65002 -H 147.93.14.107 >> ~/.ssh/known_hosts

          # 4. Lógica de reintento con Rsync
          MAX_ATTEMPTS=5
          ATTEMPT=1
          SUCCESS=false

          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "🚀 Intento de despliegue $ATTEMPT de $MAX_ATTEMPTS..."
            
            if sshpass -e rsync -avz --delete \
              -e "ssh -p 65002 -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=60" \
              ./dist/ u543991373@147.93.14.107:domains/suito.pro/public_html/; then
              SUCCESS=true
              break
            else
              echo "❌ El intento $ATTEMPT falló. Esperando 30 segundos antes de reintentar..."
              sleep 30
              ATTEMPT=$((ATTEMPT+1))
            fi
          done

          if [ "$SUCCESS" = true ]; then
            echo "✅ Despliegue completado con éxito."
          else
            echo "🔥 ERROR: Todos los intentos de despliegue fallaron."
            exit 1
          fi
