name: 🚀 PROD — Suito Unified Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Suito Platform
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build
        run: |
          npm run build

          # Redundancia de assets para Hostinger (resolución de paths por subcarpeta)
          rm -rf dist/admin/assets dist/card/assets dist/turnos/assets
          mkdir -p dist/admin/assets dist/card/assets dist/turnos/assets
          cp -r dist/assets/* dist/admin/assets/ 2>/dev/null || :
          cp -r dist/assets/* dist/card/assets/  2>/dev/null || :
          cp -r dist/assets/* dist/turnos/assets/ 2>/dev/null || :

          # Favicon en subcarpeta card
          cp card/favicon.png dist/card/favicon.png 2>/dev/null || :
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      
      - name: 🚀 Publish dist/ to deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: deploy
          publish_dir: ./dist
          force_orphan: true
