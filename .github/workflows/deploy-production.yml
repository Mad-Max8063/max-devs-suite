name: 🚀 PROD — Suito Unified Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy Suito Platform
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build & Strategic Prep
        run: |
          npm run build
          
          # Limpieza profunda de carpetas fantasma en el dist antes de subir
          # Esto asegura que no subamos carpetas viejas si el build cambió de estructura
          rm -rf dist/admin/assets dist/card/assets dist/turnos/assets
          mkdir -p dist/admin/assets dist/card/assets dist/turnos/assets
          
          # Copia limpia de assets para redundancia (Hostinger workaround)
          cp -r dist/assets/* dist/admin/assets/ 2>/dev/null || :
          cp -r dist/assets/* dist/card/assets/ 2>/dev/null || :
          cp -r dist/assets/* dist/turnos/assets/ 2>/dev/null || :
          
          # Fix Manifest PWA y SW - Copia redundante para asegurar visibilidad
          find dist/assets -name "manifest-2026-*.webmanifest" -exec cp {} dist/card/manifest-2026.webmanifest \; 2>/dev/null || :
          find dist/assets -name "manifest-2026-*.webmanifest" -exec cp {} dist/manifest-2026.webmanifest \; 2>/dev/null || :
          find dist/assets -name "card-*-2026.js" -exec cp {} dist/card/sw-2026.js \; 2>/dev/null || :
          find dist/assets -name "card-*-2026.js" -exec cp {} dist/sw-2026.js \; 2>/dev/null || :
          
          # Asegurar que toda la lógica JS esté disponible (redundancia para Vite)
          mkdir -p dist/card/js
          cp -r card/js/* dist/card/js/ 2>/dev/null || :
          
          # Asegurar Favicon en carpeta card
          cp card/favicon.png dist/card/favicon.png 2>/dev/null || :
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      
      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./dist/
          server-dir: domains/suito.pro/public_html/
          timeout: 800000
          # v2026-FINAL: Reset total para romper el bloqueo de Hostinger
          state-name: .ftp-deploy-sync-state-v2026-FINAL.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/*.map
            **/assets/assets/**
            **/tarjeta/**
            **/compartido/**
