name: PROD - Suito Unified Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------
  # JOB 1: Landing Page (suito.pro)
  # ---------------------------------------------------------
  deploy-landing:
    name: 🌐 Landing Page
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 🚀 Preparar Diagnóstico
        run: cp donde_estoy.php ./landing-ventas/
      - name: 🚀 FTP Deploy - Landing
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./landing-ventas/
          server-dir: domains/suito.pro/

  # ---------------------------------------------------------
  # JOB 2: Admin Panel (suito.pro/admin)
  # ---------------------------------------------------------
  deploy-admin:
    name: ⚙️ Admin Panel
    needs: deploy-landing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 🚀 FTP Deploy - Admin
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./admin-panel/
          server-dir: domains/suito.pro/admin/
